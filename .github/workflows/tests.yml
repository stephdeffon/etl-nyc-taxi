name: Unit tests
run-name: Tests pour ${{ github.ref_name }}

on: 
    push:
        branches: ["main", "pytest", "add-unit-test-workflow"]

    workflow_dispatch: 


permissions:
    contents: read


jobs: 
    test:
      runs-on: ubuntu-24.04
      steps:
        - name: "Checkout"
          uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7.0.0

        - name: Install dependencies
          run: 'pip install -r requirements.txt'

        - name: Run tests
          run: 'pytest'
        
        