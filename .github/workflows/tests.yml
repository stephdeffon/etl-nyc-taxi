name: Unit tests
run-name: Tests pour ${{ github.ref_name }}

on: 
    push:
        branches: ["main", "pytest", "add-unit-test-workflow"]

    workflow_dispatch: 


permissions:
    contents: read


jobs: 
    test:
      runs-on: ubuntu-24.04
      steps:
        - name: "Checkout"
          uses: actions/checkout@v4 
        
        - name: "Install Python"
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: 'pip install -r requirements.txt'

        - name: Run tests
          run: 'pytest'
        
        